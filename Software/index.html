<!DOCTYPE html>
<html>
<head>
    <title>Universe Dashboard</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .value {
            font-size: 28px;
            margin-top: 10px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h1>🌌 Universe Dashboard</h1>

<div class="container">
    <div class="card">
        <div>Energy</div>
        <div id="energy" class="value">...</div>
    </div>

    <div class="card">
        <div>Units</div>
        <div id="units" class="value">...</div>
    </div>

    <div class="card">
        <div>Pulses</div>
        <div id="pulses" class="value">...</div>
    </div>
</div>

<script>
async function atualizar() {
    try {
        const resposta = await fetch("/status");
        const data = await resposta.json();

        document.getElementById("energy").innerText = data.energia_total.toFixed(2);
        document.getElementById("units").innerText = data.dados;
        document.getElementById("pulses").innerText = data.pulsos;

    } catch (e) {
        console.log("Erro:", e);
    }
}

// Atualiza a cada 1 segundo
setInterval(atualizar, 1000);

// Atualiza imediatamente
atualizar();
</script>

</body>
</html>
